<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>إكس أو الكبرى</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rakkas&display=swap');
        
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 12px;
            background: radial-gradient(ellipse at 25% 15%, #24382c 0%, #1a2b21 45%, #10201799 100%), #16241c;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            color: #EDEFEA;
            user-select: none;
        }
        h1 {
            font-family: 'Rakkas', serif;
            font-size: 28px;
            margin: 0 0 4px;
            text-align: center;
        }
        h1 span { color: #6FE7D2; }
        
        #status {
            text-align: center;
            color: #9FB0A6;
            font-size: 14px;
            margin-bottom: 12px;
            min-height: 50px;
            white-space: pre-line;
            line-height: 1.6;
            padding: 6px 12px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
        }
        
        .frame {
            padding: 8px;
            border-radius: 12px;
            background: repeating-linear-gradient(115deg, #6b4a30, #6b4a30 5px, #5c3e28 5px, #5c3e28 10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
        }
        
        .macro {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 5px;
            background: #1c2e22;
            border-radius: 8px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }
        
        .mini {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
            aspect-ratio: 1;
        }
        .mini.active { 
            box-shadow: 0 0 0 2px #6FE7D2aa, 0 0 15px #6FE7D244; 
            background: rgba(255,255,255,0.06); 
        }
        .mini.won { opacity: 0.5; }
        
        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 4.5vw, 26px);
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            transition: background 0.1s;
            aspect-ratio: 1;
            border-radius: 4px;
        }
        .cell:hover { background: rgba(255,255,255,0.03); }
        .cell:active { background: rgba(255,255,255,0.08); }
        .cell.x { color: #6FE7D2; text-shadow: 0 0 8px #6FE7D244; }
        .cell.o { color: #FFA05C; text-shadow: 0 0 8px #FFA05C44; }
        
        .mini-winner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(30px, 8vw, 46px);
            background: rgba(16,24,18,0.82);
            border-radius: 6px;
            pointer-events: none;
        }
        .mini-winner.x { color: #6FE7D2cc; }
        .mini-winner.o { color: #FFA05Ccc; }
        .mini-winner.draw { color: #9FB0A6cc; }
        
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a2c1e;
            color: #9FB0A6;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            font-weight: 700;
        }
        
        #reset {
            margin-top: 14px;
            padding: 8px 20px;
            border-radius: 8px;
            border: 1.5px dashed rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.02);
            color: #9FB0A6;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        #reset:active { background: rgba(255,255,255,0.06); }
        
        @media (max-width: 420px) {
            .macro { gap: 4px; padding: 4px; }
            .frame { padding: 5px; }
            #status { font-size: 12px; min-height: 44px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <h1>❌⭕ <span>إكس أو</span> الكبرى</h1>
    <div id="status">⏳ جاري التحميل…</div>
    
    <div class="frame">
        <div class="macro" id="macro"></div>
    </div>
    
    <button id="reset">🔄 لعبة جديدة</button>

    <script>
        // ============================================================
        // 1) بيانات تجريبية لعرض اللوحات فوراً
        // ============================================================
        function createDemoGame() {
            return {
                boards: Array.from({length:9}, () => Array(9).fill(null)),
                boardWinners: Array(9).fill(null),
                activeBoard: null,
                turn: "X",
                players: { 
                    X: { id: "player1", name: "مهدي" }, 
                    O: null 
                },
                winner: null,
            };
        }

        // ============================================================
        // 2) عرض اللوحات - نسخة مبسطة
        // ============================================================
        function renderBoards(game) {
            const macro = document.getElementById("macro");
            macro.innerHTML = "";
            
            for (let b = 0; b < 9; b++) {
                const mini = document.createElement("div");
                mini.className = "mini active";
                
                for (let c = 0; c < 9; c++) {
                    const btn = document.createElement("button");
                    btn.className = "cell";
                    btn.innerText = "";
                    btn.setAttribute("data-board", b);
                    btn.setAttribute("data-cell", c);
                    btn.onclick = function() {
                        alert(`ضغطت على لوحة ${b+1} - مربع ${c+1}`);
                    };
                    mini.appendChild(btn);
                }
                
                const badge = document.createElement("span");
                badge.className = "badge";
                badge.innerText = b + 1;
                mini.appendChild(badge);
                macro.appendChild(mini);
            }
            
            document.getElementById("status").innerText = "✅ تم تحميل اللوحات! اضغط على أي لوحة لتبدأ";
        }

        // ============================================================
        // 3) تشغيل التجربة
        // ============================================================
        window.onload = function() {
            console.log("✅ الصفحة تحمّلت!");
            renderBoards(createDemoGame());
        };
    </script>

</body>
</html>
