<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>إكس أو الكبرى</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rakkas&display=swap');
        
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 12px;
            background: radial-gradient(ellipse at 25% 15%, #24382c 0%, #1a2b21 45%, #10201799 100%), #16241c;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            color: #EDEFEA;
            user-select: none;
        }
        h1 {
            font-family: 'Rakkas', serif;
            font-size: 28px;
            margin: 0 0 4px;
            text-align: center;
        }
        h1 span { color: #6FE7D2; }
        
        #status {
            text-align: center;
            color: #9FB0A6;
            font-size: 14px;
            margin-bottom: 12px;
            min-height: 50px;
            white-space: pre-line;
            line-height: 1.6;
            padding: 6px 12px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
        }
        
        .frame {
            padding: 8px;
            border-radius: 12px;
            background: repeating-linear-gradient(115deg, #6b4a30, #6b4a30 5px, #5c3e28 5px, #5c3e28 10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
        }
        
        .macro {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 5px;
            background: #1c2e22;
            border-radius: 8px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }
        
        .mini {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
            aspect-ratio: 1;
        }
        .mini.active { 
            box-shadow: 0 0 0 2px #6FE7D2aa, 0 0 15px #6FE7D244; 
            background: rgba(255,255,255,0.06); 
        }
        .mini.won { opacity: 0.5; }
        
        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 4.5vw, 26px);
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            transition: background 0.1s;
            aspect-ratio: 1;
            border-radius: 4px;
        }
        .cell:hover { background: rgba(255,255,255,0.03); }
        .cell:active { background: rgba(255,255,255,0.08); }
        .cell.x { color: #6FE7D2; text-shadow: 0 0 8px #6FE7D244; }
        .cell.o { color: #FFA05C; text-shadow: 0 0 8px #FFA05C44; }
        
        .mini-winner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(30px, 8vw, 46px);
            background: rgba(16,24,18,0.82);
            border-radius: 6px;
            pointer-events: none;
        }
        .mini-winner.x { color: #6FE7D2cc; }
        .mini-winner.o { color: #FFA05Ccc; }
        .mini-winner.draw { color: #9FB0A6cc; }
        
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a2c1e;
            color: #9FB0A6;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            font-weight: 700;
        }
        
        #reset {
            margin-top: 14px;
            padding: 8px 20px;
            border-radius: 8px;
            border: 1.5px dashed rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.02);
            color: #9FB0A6;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        #reset:active { background: rgba(255,255,255,0.06); }
        
        @media (max-width: 420px) {
            .macro { gap: 4px; padding: 4px; }
            .frame { padding: 5px; }
            #status { font-size: 12px; min-height: 44px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <h1>❌⭕ <span>إكس أو</span> الكبرى</h1>
    <div id="status">⏳ جاري الاتصال بالخادم...</div>
    
    <div class="frame">
        <div class="macro" id="macro"></div>
    </div>
    
    <button id="reset">🔄 لعبة جديدة</button>

    <script>
        // ============================================================
        // 1) إعدادات Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0RjsdEk85fnZgciH-z8Uu-JT4dN_BLYQ",
            authDomain: "xobot-d7b7f.firebaseapp.com",
            databaseURL: "https://xobot-d7b7f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "xobot-d7b7f",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 2) دوال مساعدة
        // ============================================================
        const LINES = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6],
        ];

        function checkWinner(cells) {
            for (const [a,b,c] of LINES) {
                if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
                    return cells[a];
                }
            }
            if (cells.every(c => c !== null)) return "draw";
            return null;
        }

        function getUser() {
            const tg = window.Telegram?.WebApp;
            const tgUser = tg?.initDataUnsafe?.user;
            if (tgUser && tgUser.first_name) {
                return { id: String(tgUser.id), name: tgUser.first_name };
            }
            let name = localStorage.getItem("player_name");
            if (!name) {
                name = prompt("👋 ادخل اسمك:", "") || "زائر";
                localStorage.setItem("player_name", name);
            }
            let id = localStorage.getItem("player_id");
            if (!id) {
                id = "p_" + Math.random().toString(36).slice(2, 7);
                localStorage.setItem("player_id", id);
            }
            return { id, name };
        }

        function emptyState() {
            return {
                boards: Array.from({length:9}, () => Array(9).fill(null)),
                boardWinners: Array(9).fill(null),
                activeBoard: null,
                turn: "X",
                players: { X: null, O: null },
                winner: null,
            };
        }

        // ============================================================
        // 3) تهيئة اللعبة والاتصال بالـ DB
        // ============================================================
        const params = new URLSearchParams(location.search);
        const gameId = params.get("game") || "demo";
        const gameRef = db.ref("games/" + gameId);
        const me = getUser();
        let mySymbol = null; 
        let latestState = null; 

        function render(s) {
            latestState = s;
            
            // تحديد الرمز ديناميكياً من السيرفر لمنع ثغرات التزامن
            if (s.players?.X?.id === me.id) mySymbol = "X";
            else if (s.players?.O?.id === me.id) mySymbol = "O";
            else mySymbol = null;

            const xName = s.players?.X?.name || "بانتظار لاعب...";
            const oName = s.players?.O?.name || "بانتظار لاعب...";
            
            let roleBadge = mySymbol ? `(أنت ${mySymbol === 'X' ? '❎' : '⭕'})` : "(مُشاهد)";
            let statusText = `❎ ${xName}  |  ⭕ ${oName} ${roleBadge}`;
            
            if (s.winner === "draw") {
                statusText += "\n🤝 انتهت المباراة بالتعادل!";
            } else if (s.winner) {
                statusText += `\n🎉 الفائز هو: ${s.players[s.winner]?.name || s.winner}`;
            } else if (!s.players?.X || !s.players?.O) {
                statusText += "\n⏳ بانتظار اكتمال اللاعبين لبدء التحدي...";
            } else {
                const turnName = s.players[s.turn]?.name || s.turn;
                statusText += `\n▶️ دور: ${turnName} (${s.turn === 'X' ? '❎' : '⭕'})`;
                if(s.turn === mySymbol) statusText += " 👈 دورك الآن!";
            }
            
            document.getElementById("status").innerText = statusText;
            
            const macro = document.getElementById("macro");
            macro.innerHTML = "";
            
            for (let b = 0; b < 9; b++) {
                const mini = document.createElement("div");
                mini.className = "mini";
                
                const isActive = !s.winner && 
                    !s.boardWinners[b] && 
                    (s.activeBoard === null || s.activeBoard === b);
                if (isActive) mini.classList.add("active");
                if (s.boardWinners[b]) mini.classList.add("won");
                
                for (let c = 0; c < 9; c++) {
                    const btn = document.createElement("button");
                    const val = s.boards[b][c];
                    btn.className = "cell" + (val === "X" ? " x" : val === "O" ? " o" : "");
                    btn.innerText = val === "X" ? "❎" : val === "O" ? "⭕" : "";
                    btn.onclick = () => playMove(b, c);
                    mini.appendChild(btn);
                }
                
                if (s.boardWinners[b]) {
                    const ov = document.createElement("div");
                    const r = s.boardWinners[b];
                    ov.className = "mini-winner " + (r === "X" ? "x" : r === "O" ? "o" : "draw");
                    ov.innerText = r === "draw" ? "➖" : r === "X" ? "❎" : "⭕";
                    mini.appendChild(ov);
                }
                
                const badge = document.createElement("span");
                badge.className = "badge";
                badge.innerText = b + 1;
                mini.appendChild(badge);
                macro.appendChild(mini);
            }
            
            // إظهار زر إعادة التشغيل فقط للاعبين المشاركين عند انتهاء اللعبة
            document.getElementById("reset").style.display = (s.winner && mySymbol) ? "block" : "none";
        }

        // ============================================================
        // 4) تنفيذ الحركة
        // ============================================================
        function playMove(b, c) {
            const s = latestState;
            if (!s) return;

            if (!mySymbol) {
                alert("🚫 أنت لست لاعباً في هذه المباراة (مشاهد فقط).");
                return;
            }
            if (!s.players.X || !s.players.O) {
                alert("⏳ لا يمكن اللعب حتى ينضم اللاعب الثاني.");
                return;
            }
            if (s.winner) return;
            if (s.turn !== mySymbol) {
                alert("⏳ ليس دورك، انتظر خصمك!");
                return;
            }
            if (s.boardWinners[b]) return;
            if (s.activeBoard !== null && s.activeBoard !== b) {
                alert(`📍 تحذير: يجب أن تلعب داخل اللوحة رقم ${s.activeBoard + 1}`);
                return;
            }
            if (s.boards[b][c] !== null) return;

            // تطبيق الحركة
            const boards = s.boards.map(row => row.slice());
            boards[b][c] = mySymbol;

            const boardWinners = s.boardWinners.slice();
            const local = checkWinner(boards[b]);
            if (local) boardWinners[b] = local;

            const macroResult = checkWinner(boardWinners.map(w => w === "draw" ? null : w));

            let nextActive = c;
            if (boardWinners[c]) nextActive = null;

            const newState = { ...s, boards, boardWinners };

            if (macroResult) {
                newState.winner = macroResult;
            } else if (boardWinners.every(w => w !== null)) {
                newState.winner = "draw";
            } else {
                newState.activeBoard = nextActive;
                newState.turn = mySymbol === "X" ? "O" : "X";
            }

            gameRef.set(newState);
        }

        // ============================================================
        // 5) إدارة الانضمام التلقائي والدخول للغرفة
        // ============================================================
        function handleJoin(s) {
            // إذا لم يكن هناك لاعب X، سجل اللاعب الحالي كـ X فوراً
            if (!s.players?.X) {
                gameRef.child("players/X").set(me);
                return true;
            }
            // إذا كان خانة O فارغة واللاعب الحالي ليس هو نفسه X، سجله كـ O
            if (!s.players?.O && s.players?.X?.id !== me.id) {
                gameRef.child("players/O").set(me);
                return true;
            }
            return false;
        }

        function startGame() {
            gameRef.on("value", (snap) => {
                const data = snap.val();
                if (!data) {
                    // إنشاء غرفة جديدة تماماً إذا كانت فارغة
                    const newGame = emptyState();
                    newGame.players.X = me;
                    gameRef.set(newGame);
                } else {
                    // محاولة إدخال اللاعب للغرفة تلقائياً إذا كان هناك مكان شاغر
                    const joined = handleJoin(data);
                    if (!joined) {
                        render(data);
                    }
                }
            });
        }

        // ============================================================
        // 6) زر إعادة الضبط الذكي (يحافظ على اللاعبين)
        // ============================================================
        document.getElementById("reset").onclick = () => {
            if (!mySymbol || !latestState) return;
            
            const freshState = emptyState();
            // الحفاظ على هويات اللاعبين لتسهيل الانتقام (Rematch) مباشرة دون الحاجة لإعادة التسجيل
            freshState.players.X = latestState.players.X;
            freshState.players.O = latestState.players.O;
            
            // تبديل الأدوار للعبة القادمة بشكل عادل (الخاسر يبدأ أو تبديل عشوائي)
            freshState.turn = latestState.winner && latestState.winner !== 'draw' ? latestState.winner : "X";

            gameRef.set(freshState);
        };

        // ============================================================
        // 7) الاتصال وبدء العمل
        // ============================================================
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                document.getElementById("status").innerText = "✅ متصل... جاري الدخول للغرفة";
                startGame();
            } else {
                document.getElementById("status").innerText = "⚠️ انقطع الاتصال... جاري محاولة إعادة الاتصال";
            }
        });
    </script>
</body>
</html>
