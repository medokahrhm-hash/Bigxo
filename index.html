<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>إكس أو الكبرى</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rakkas&display=swap');
        
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 12px;
            background: radial-gradient(ellipse at 25% 15%, #24382c 0%, #1a2b21 45%, #10201799 100%), #16241c;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            color: #EDEFEA;
            user-select: none;
        }
        h1 {
            font-family: 'Rakkas', serif;
            font-size: 28px;
            margin: 0 0 4px;
            text-align: center;
        }
        h1 span { color: #6FE7D2; }
        
        #status {
            text-align: center;
            color: #9FB0A6;
            font-size: 14px;
            margin-bottom: 12px;
            min-height: 55px;
            white-space: pre-line;
            line-height: 1.6;
            padding: 6px 12px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            transition: all 0.3s;
        }
        #status.loading { color: #FFD93D; }
        #status.error { color: #FF6B6B; }
        #status.success { color: #6FE7D2; }
        
        .frame {
            padding: 8px;
            border-radius: 12px;
            background: repeating-linear-gradient(115deg, #6b4a30, #6b4a30 5px, #5c3e28 5px, #5c3e28 10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
        }
        
        .macro {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 5px;
            background: #1c2e22;
            border-radius: 8px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }
        
        .mini {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
            aspect-ratio: 1;
            transition: all 0.2s;
        }
        .mini.active { 
            box-shadow: 0 0 0 2px #6FE7D2aa, 0 0 15px #6FE7D244; 
            background: rgba(255,255,255,0.06); 
        }
        .mini.won { opacity: 0.5; }
        .mini.highlight { box-shadow: 0 0 0 2px #FFD93Daa; }
        
        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 4.5vw, 26px);
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            transition: background 0.1s, transform 0.1s;
            aspect-ratio: 1;
            border-radius: 4px;
        }
        .cell:hover { background: rgba(255,255,255,0.03); }
        .cell:active { 
            background: rgba(255,255,255,0.08);
            transform: scale(0.92);
        }
        .cell.x { color: #6FE7D2; text-shadow: 0 0 8px #6FE7D244; }
        .cell.o { color: #FFA05C; text-shadow: 0 0 8px #FFA05C44; }
        .cell.disabled { cursor: not-allowed; opacity: 0.5; }
        
        .mini-winner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(30px, 8vw, 46px);
            background: rgba(16,24,18,0.82);
            border-radius: 6px;
            pointer-events: none;
            animation: fadeIn 0.3s ease;
        }
        .mini-winner.x { color: #6FE7D2cc; }
        .mini-winner.o { color: #FFA05Ccc; }
        .mini-winner.draw { color: #9FB0A6cc; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a2c1e;
            color: #9FB0A6;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            font-weight: 700;
        }
        
        #reset {
            margin-top: 14px;
            padding: 8px 20px;
            border-radius: 8px;
            border: 1.5px dashed rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.02);
            color: #9FB0A6;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        #reset:active { background: rgba(255,255,255,0.06); }
        #reset.show { display: block; }
        
        #loading-indicator {
            display: none;
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,217,61,0.15);
            color: #FFD93D;
            font-size: 12px;
            animation: pulse 1s infinite;
        }
        #loading-indicator.show { display: inline-block; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 420px) {
            .macro { gap: 4px; padding: 4px; }
            .frame { padding: 5px; }
            #status { font-size: 12px; min-height: 44px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <h1>❌⭕ <span>إكس أو</span> الكبرى</h1>
    <div id="status">⏳ جاري التحميل...</div>
    <div id="loading-indicator">⏳ جاري إرسال الحركة...</div>
    
    <div class="frame">
        <div class="macro" id="macro"></div>
    </div>
    
    <button id="reset">🔄 لعبة جديدة</button>

    <script>
        // ============================================================
        // 1) Firebase Config
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0RjsdEk85fnZgciH-z8Uu-JT4dN_BLYQ",
            authDomain: "xobot-d7b7f.firebaseapp.com",
            databaseURL: "https://xobot-d7b7f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "xobot-d7b7f",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 2) Utilities
        // ============================================================
        const LINES = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6],
        ];

        function checkWinner(cells) {
            for (const [a,b,c] of LINES) {
                if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
                    return cells[a];
                }
            }
            if (cells.every(c => c !== null)) return "draw";
            return null;
        }

        function checkMacroWinner(boardWinners) {
            // تحويل draw إلى null للفحص
            const mapped = boardWinners.map(w => w === "draw" ? null : w);
            return checkWinner(mapped);
        }

        function getUser() {
            const tg = window.Telegram?.WebApp;
            const tgUser = tg?.initDataUnsafe?.user;
            if (tgUser && tgUser.first_name) {
                return { id: String(tgUser.id), name: tgUser.first_name };
            }
            let name = localStorage.getItem("player_name");
            if (!name) {
                name = prompt("👋 ادخل اسمك:", "") || "زائر";
                localStorage.setItem("player_name", name);
            }
            let id = localStorage.getItem("player_id");
            if (!id) {
                id = "p_" + Math.random().toString(36).slice(2, 7);
                localStorage.setItem("player_id", id);
            }
            return { id, name };
        }

        function emptyState() {
            return {
                boards: Array.from({length:9}, () => Array(9).fill(null)),
                boardWinners: Array(9).fill(null),
                activeBoard: null,
                turn: "X",
                players: { X: null, O: null },
                winner: null,
                lastMove: null,
            };
        }

        function setStatus(text, type = '') {
            const el = document.getElementById("status");
            el.innerText = text;
            el.className = type;
        }

        function showLoading(show) {
            document.getElementById("loading-indicator").className = show ? "show" : "";
        }

        // ============================================================
        // 3) Game State
        // ============================================================
        const params = new URLSearchParams(location.search);
        const gameId = params.get("game") || "demo";
        const gameRef = db.ref("games/" + gameId);
        const me = getUser();
        let mySymbol = null;
        let moveLock = false;
        let isFirstLoad = true;

        // ============================================================
        // 4) Player Manager
        // ============================================================
        function setupPlayerCleanup() {
            // حذف اللاعب عند الخروج
            if (mySymbol) {
                const playerRef = gameRef.child("players/" + mySymbol);
                playerRef.onDisconnect().remove().catch(console.error);
            }
        }

        function tryJoinTransaction() {
            gameRef.transaction((current) => {
                if (!current) {
                    const s = emptyState();
                    s.players.X = me;
                    s.lastMove = Date.now();
                    return s;
                }
                if (current.players?.X?.id === me.id) return current;
                if (current.players?.O?.id === me.id) return current;
                if (!current.players?.X) {
                    current.players.X = me;
                    current.lastMove = Date.now();
                    return current;
                }
                if (!current.players?.O) {
                    current.players.O = me;
                    current.lastMove = Date.now();
                    return current;
                }
                return current;
            }, (err, committed, snap) => {
                if (err) {
                    console.error("Join error:", err);
                    setStatus("❌ خطأ في الاتصال", "error");
                }
            });
        }

        // ============================================================
        // 5) Renderer (محسّن: تحديث الخلايا فقط)
        // ============================================================
        let cachedBoards = null;
        let cachedWinners = null;

        function render(s) {
            if (!s) {
                tryJoinTransaction();
                return;
            }

            // تحديث الرمز
            if (s.players?.X?.id === me.id) mySymbol = "X";
            else if (s.players?.O?.id === me.id) mySymbol = "O";
            else mySymbol = null;

            // تنظيف عند الخروج
            if (mySymbol && isFirstLoad) {
                setupPlayerCleanup();
                isFirstLoad = false;
            }

            // تحديث الحالة
            const xName = s.players?.X?.name || "بانتظار لاعب...";
            const oName = s.players?.O?.name || "بانتظار لاعب...";
            const roleBadge = mySymbol ? `(أنت ${mySymbol === 'X' ? '❎' : '⭕'})` : "(👀 مشاهد)";
            let statusText = `❎ ${xName}  |  ⭕ ${oName} ${roleBadge}`;
            
            if (s.winner === "draw") {
                statusText += "\n🤝 تعادل!";
                setStatus(statusText, '');
            } else if (s.winner) {
                const winnerName = s.players[s.winner]?.name || s.winner;
                const isMe = s.winner === mySymbol;
                statusText += `\n${isMe ? '🎉' : '😔'} الفائز: ${winnerName}`;
                setStatus(statusText, isMe ? 'success' : '');
            } else if (!s.players?.X || !s.players?.O) {
                statusText += "\n⏳ بانتظار لاعب آخر...";
                setStatus(statusText, '');
            } else {
                const turnName = s.players[s.turn]?.name || s.turn;
                const isMyTurn = s.turn === mySymbol;
                statusText += `\n▶️ دور: ${turnName}`;
                if (isMyTurn) statusText += " 👈 دورك!";
                setStatus(statusText, isMyTurn ? 'success' : '');
            }

            // إظهار زر إعادة اللعب
            const resetBtn = document.getElementById("reset");
            if (s.winner && mySymbol) {
                resetBtn.className = "show";
            } else {
                resetBtn.className = "";
            }

            // رسم اللوحات (تحديث الخلايا فقط)
            const macro = document.getElementById("macro");
            
            // إنشاء الهيكل مرة واحدة فقط
            if (isFirstLoad || macro.children.length === 0) {
                macro.innerHTML = "";
                for (let b = 0; b < 9; b++) {
                    const mini = document.createElement("div");
                    mini.className = "mini";
                    mini.id = `mini-${b}`;
                    
                    for (let c = 0; c < 9; c++) {
                        const btn = document.createElement("button");
                        btn.className = "cell";
                        btn.id = `cell-${b}-${c}`;
                        btn.setAttribute("data-board", b);
                        btn.setAttribute("data-cell", c);
                        btn.onclick = () => playMove(b, c);
                        mini.appendChild(btn);
                    }
                    
                    const badge = document.createElement("span");
                    badge.className = "badge";
                    badge.innerText = b + 1;
                    mini.appendChild(badge);
                    macro.appendChild(mini);
                }
            }

            // تحديث الخلايا
            for (let b = 0; b < 9; b++) {
                const mini = document.getElementById(`mini-${b}`);
                
                // تحديث حالة اللوحة
                const isActive = !s.winner && 
                    !s.boardWinners[b] && 
                    (s.activeBoard === null || s.activeBoard === b);
                
                mini.className = "mini" + 
                    (isActive ? " active" : "") + 
                    (s.boardWinners[b] ? " won" : "");
                
                // إزالة overlay القديم
                const oldOverlay = mini.querySelector('.mini-winner');
                if (oldOverlay) oldOverlay.remove();
                
                // إضافة overlay جديد إذا كانت اللوحة محسومة
                if (s.boardWinners[b]) {
                    const ov = document.createElement("div");
                    const r = s.boardWinners[b];
                    ov.className = "mini-winner " + (r === "X" ? "x" : r === "O" ? "o" : "draw");
                    ov.innerText = r === "draw" ? "➖" : r === "X" ? "❎" : "⭕";
                    mini.appendChild(ov);
                }
                
                // تحديث الخلايا
                for (let c = 0; c < 9; c++) {
                    const btn = document.getElementById(`cell-${b}-${c}`);
                    const val = s.boards[b][c];
                    btn.className = "cell" + 
                        (val === "X" ? " x" : val === "O" ? " o" : "") +
                        (s.winner || !isActive ? " disabled" : "");
                    btn.innerText = val === "X" ? "❎" : val === "O" ? "⭕" : "";
                }
            }

            cachedBoards = s.boards;
            cachedWinners = s.boardWinners;
        }

        // ============================================================
        // 6) Firebase Sync
        // ============================================================
        function syncGame() {
            gameRef.on("value", (snap) => {
                const data = snap.val();
                if (data) {
                    render(data);
                } else {
                    // إنشاء غرفة جديدة
                    tryJoinTransaction();
                }
            }, (err) => {
                console.error("Sync error:", err);
                setStatus("⚠️ انقطع الاتصال... جاري إعادة المحاولة", "error");
            });
        }

        // ============================================================
        // 7) Play Move (باستخدام Transaction)
        // ============================================================
        function playMove(b, c) {
            if (moveLock) {
                setStatus("⏳ جاري تنفيذ حركة سابقة...", '');
                return;
            }

            if (!mySymbol) {
                setStatus("❌ أنت مشاهد فقط!", "error");
                return;
            }

            // التحقق المسبق من البيانات الحالية
            gameRef.once("value", (snap) => {
                const s = snap.val();
                if (!s) return;

                if (!s.players.X || !s.players.O) {
                    setStatus("⏳ بانتظار اللاعب الثاني!", "");
                    return;
                }
                if (s.winner) {
                    setStatus("⛔ انتهت اللعبة!", "error");
                    return;
                }
                if (s.turn !== mySymbol) {
                    setStatus("⏳ ليس دورك!", "");
                    return;
                }
                if (s.boardWinners[b]) {
                    setStatus("🚫 هذه اللوحة محسومة!", "error");
                    return;
                }
                if (s.activeBoard !== null && s.activeBoard !== b) {
                    setStatus(`📍 العب في اللوحة ${s.activeBoard + 1}`, "");
                    return;
                }
                if (s.boards[b][c] !== null) {
                    setStatus("🚫 هذا المربع محجوز!", "error");
                    return;
                }

                // تنفيذ الحركة باستخدام Transaction
                moveLock = true;
                showLoading(true);
                setStatus("⏳ جاري إرسال الحركة...", "loading");

                gameRef.transaction((current) => {
                    if (!current) return current;
                    
                    // التحقق من صحة الحالة قبل التعديل
                    if (current.winner) return current;
                    if (current.turn !== mySymbol) return current;
                    if (current.boardWinners[b]) return current;
                    if (current.activeBoard !== null && current.activeBoard !== b) return current;
                    if (current.boards[b][c] !== null) return current;
                    
                    // تطبيق الحركة
                    const boards = current.boards.map(row => row.slice());
                    boards[b][c] = mySymbol;
                    
                    const boardWinners = current.boardWinners.slice();
                    const local = checkWinner(boards[b]);
                    if (local) boardWinners[b] = local;
                    
                    const macroResult = checkMacroWinner(boardWinners);
                    
                    let nextActive = c;
                    if (boardWinners[c]) nextActive = null;
                    
                    const newState = {
                        ...current,
                        boards,
                        boardWinners,
                        lastMove: Date.now(),
                    };
                    
                    if (macroResult) {
                        newState.winner = macroResult;
                    } else if (boardWinners.every(w => w !== null)) {
                        newState.winner = "draw";
                    } else {
                        newState.activeBoard = nextActive;
                        newState.turn = mySymbol === "X" ? "O" : "X";
                    }
                    
                    return newState;
                }, (err, committed, snap) => {
                    moveLock = false;
                    showLoading(false);
                    
                    if (err) {
                        console.error("Move error:", err);
                        setStatus("❌ خطأ في إرسال الحركة!", "error");
                        return;
                    }
                    
                    if (!committed) {
                        setStatus("⚠️ تم تعديل اللعبة أثناء إرسال الحركة، حاول مرة أخرى", "");
                    } else {
                        setStatus("✅ تمت الحركة!", "success");
                    }
                });
            });
        }

        // ============================================================
        // 8) Reset Game
        // ============================================================
        document.getElementById("reset").onclick = () => {
            if (!mySymbol) {
                setStatus("❌ أنت مشاهد فقط!", "error");
                return;
            }
            
            gameRef.transaction((current) => {
                if (!current) return current;
                if (!current.winner) return current;
                
                const fresh = emptyState();
                // الحفاظ على اللاعبين
                fresh.players.X = current.players.X;
                fresh.players.O = current.players.O;
                fresh.turn = "X";
                fresh.lastMove = Date.now();
                return fresh;
            }, (err, committed, snap) => {
                if (err) {
                    console.error("Reset error:", err);
                    setStatus("❌ خطأ في إعادة اللعبة!", "error");
                } else if (committed) {
                    setStatus("🔄 تم إعادة اللعبة!", "success");
                }
            });
        };

        // ============================================================
        // 9) Telegram WebApp
        // ============================================================
        try {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        } catch (e) {
            console.log("Not in Telegram WebApp");
        }

        // ============================================================
        // 10) Initialization
        // ============================================================
        // التحقق من الاتصال
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                console.log("✅ متصل بـ Firebase");
                setStatus("✅ متصل... جاري التحميل", "success");
                syncGame();
            } else {
                console.log("❌ غير متصل بـ Firebase");
                setStatus("⚠️ جاري إعادة الاتصال...", "error");
            }
        });

        // مؤقت لإعادة الاتصال
        setInterval(() => {
            if (!cachedBoards) {
                console.log("🔄 محاولة إعادة الاتصال...");
                syncGame();
            }
        }, 30000);

        console.log("👤 المستخدم:", me);
        console.log("🎮 معرف اللعبة:", gameId);
        console.log("🔗 رابط المشاركة:", location.href);

        // ============================================================
        // 11) معالجة الأخطاء العامة
        // ============================================================
        window.addEventListener('error', (e) => {
            console.error("Uncaught error:", e);
            setStatus("⚠️ حدث خطأ غير متوقع", "error");
        });

        window.addEventListener('offline', () => {
            setStatus("⚠️ انقطع الاتصال بالإنترنت", "error");
        });

        window.addEventListener('online', () => {
            setStatus("🔄 تم استعادة الاتصال، جاري التحديث...", "success");
            syncGame();
        });
    </script>

</body>
</html>
